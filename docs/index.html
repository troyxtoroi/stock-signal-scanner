<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>台股信號儀表板</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #080b11;
      --panel:   #0e1420;
      --card:    #121929;
      --border:  #1e2d45;
      --text:    #e2e8f0;
      --muted:   #64748b;
      --green:   #00d084;
      --red:     #ff4757;
      --yellow:  #ffd32a;
      --blue:    #4a9eff;
      --purple:  #a855f7;
      --cyan:    #00cec9;
      --gold:    #ffc107;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
    }

    /* ── 頂部導覽列 ── */
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 28px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .nav-logo { font-size: 1rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .nav-logo span { color: var(--green); }
    .nav-meta { color: var(--muted); font-size: 0.78rem; }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .btn-refresh {
      background: linear-gradient(135deg, #00d084, #00a86b);
      color: #000; border: none; padding: 7px 16px; border-radius: 6px;
      font-size: 0.82rem; font-weight: 700; cursor: pointer;
    }
    .btn-refresh:hover { opacity: .9; }

    /* ── 主體 ── */
    main { padding: 24px 28px; max-width: 1600px; margin: 0 auto; }

    /* ── 統計卡片列 ── */
    .stat-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 28px; }
    .stat {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 18px;
      position: relative; overflow: hidden;
    }
    .stat::before {
      content: ""; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    }
    .stat.s-green::before { background: var(--green); }
    .stat.s-red::before   { background: var(--red); }
    .stat.s-blue::before  { background: var(--blue); }
    .stat.s-gold::before  { background: var(--gold); }
    .stat .n { font-size: 1.9rem; font-weight: 800; line-height: 1; }
    .stat .l { color: var(--muted); font-size: 0.72rem; margin-top: 6px; letter-spacing: .04em; }

    /* ── 區塊標題 ── */
    .sec { margin-bottom: 28px; }
    .sec-hd {
      display: flex; align-items: center; gap: 10px;
      font-size: 0.78rem; font-weight: 700; color: var(--muted);
      letter-spacing: .1em; text-transform: uppercase;
      margin-bottom: 12px; padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .sec-hd .badge-count {
      background: var(--border); color: var(--muted);
      padding: 1px 8px; border-radius: 10px; font-size: 0.7rem;
    }

    /* ── 股票主表格 ── */
    .tbl-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; font-size: 0.86rem; }
    thead th {
      background: var(--panel);
      color: var(--muted); font-weight: 500;
      padding: 11px 14px; text-align: left;
      white-space: nowrap; border-bottom: 1px solid var(--border);
      font-size: 0.74rem; letter-spacing: .05em;
    }
    thead th.r { text-align: right; }
    tbody tr { border-bottom: 1px solid var(--border); transition: background .12s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--panel); }
    td { padding: 12px 14px; vertical-align: middle; }
    td.r { text-align: right; }

    .ticker-wrap { display: flex; align-items: center; gap: 8px; }
    .tag-etf   { font-size: .65rem; padding: 2px 6px; border-radius: 4px; background: rgba(0,206,201,.12); color: var(--cyan); font-weight:600; }
    .tag-stock { font-size: .65rem; padding: 2px 6px; border-radius: 4px; background: rgba(74,158,255,.12); color: var(--blue); font-weight:600; }
    .t-name { font-weight: 700; font-size: .95rem; }

    .price-val { font-weight: 700; font-size: .98rem; }
    .chg-up   { color: var(--green); font-weight: 600; }
    .chg-down { color: var(--red);   font-weight: 600; }
    .chg-flat { color: var(--muted); }

    /* 迷你走勢圖 */
    .spark { display: block; }

    /* 信號 pills */
    .pills { display: flex; flex-wrap: wrap; gap: 4px; max-width: 280px; }
    .pill {
      font-size: .68rem; padding: 2px 8px; border-radius: 10px;
      background: rgba(0,208,132,.1); color: var(--green);
      border: 1px solid rgba(0,208,132,.2);
      white-space: nowrap;
    }
    .no-sig { color: var(--muted); font-size: .8rem; }

    /* AI 建議 */
    .ai-buy   { display:inline-flex; align-items:center; gap:5px; padding:4px 10px; border-radius:6px; font-size:.78rem; font-weight:700; background:rgba(0,208,132,.12); color:var(--green); border:1px solid rgba(0,208,132,.25); }
    .ai-watch { display:inline-flex; align-items:center; gap:5px; padding:4px 10px; border-radius:6px; font-size:.78rem; font-weight:700; background:rgba(255,211,42,.1);  color:var(--yellow);border:1px solid rgba(255,211,42,.25); }
    .ai-avoid { display:inline-flex; align-items:center; gap:5px; padding:4px 10px; border-radius:6px; font-size:.78rem; font-weight:700; background:rgba(255,71,87,.1);   color:var(--red);   border:1px solid rgba(255,71,87,.25); }
    .ai-none  { color:var(--muted); font-size:.8rem; }
    .ai-reason{ color:var(--muted); font-size:.72rem; margin-top:3px; max-width:160px; line-height:1.4; }

    /* ── 警示卡片 ── */
    .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 12px; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px; padding: 16px;
      border-left: 3px solid var(--border);
    }
    .card.c-green  { border-left-color: var(--green); }
    .card.c-red    { border-left-color: var(--red); }
    .card.c-yellow { border-left-color: var(--yellow); }
    .card.c-purple { border-left-color: var(--purple); }
    .card.c-cyan   { border-left-color: var(--cyan); }
    .card-hd { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
    .card-ticker { font-weight:700; font-size:.95rem; }
    .chip { font-size:.68rem; padding:3px 9px; border-radius:10px; font-weight:700; }
    .chip.green  { background:rgba(0,208,132,.15); color:var(--green); }
    .chip.red    { background:rgba(255,71,87,.15);  color:var(--red); }
    .chip.yellow { background:rgba(255,211,42,.12); color:var(--yellow); }
    .chip.purple { background:rgba(168,85,247,.15); color:var(--purple); }
    .chip.cyan   { background:rgba(0,206,201,.12);  color:var(--cyan); }
    .kv { display:grid; grid-template-columns:1fr 1fr; gap:6px 12px; font-size:.82rem; margin-top:6px; }
    .kv .k { color:var(--muted); }
    .kv .v { text-align:right; font-weight:600; }
    .card-msg { font-size:.83rem; color:var(--muted); line-height:1.6; }

    .empty-state {
      background: var(--card); border: 1px dashed var(--border);
      border-radius: 10px; padding: 20px;
      text-align: center; color: var(--muted); font-size: .83rem;
    }

    .loading { text-align:center; padding:80px; color:var(--muted); font-size:1rem; }
    footer { text-align:center; color:var(--muted); font-size:.72rem; padding:28px; border-top:1px solid var(--border); margin-top:20px; }
  </style>
</head>
<body>
<nav>
  <div class="nav-logo">📈 <span>台股信號</span>儀表板</div>
  <div class="nav-meta" id="nav-time">載入中...</div>
  <div class="nav-right">
    <button class="btn-refresh" onclick="load()">↻ 重新整理</button>
  </div>
</nav>

<main id="app">
  <div class="loading">⏳ 載入資料中...</div>
</main>

<script>
// ── 走勢迷你圖 SVG ──────────────────────────────────────────
function sparkline(prices, w=80, h=32) {
  if (!prices || prices.length < 2) return "";
  const min = Math.min(...prices), max = Math.max(...prices);
  const range = max - min || 1;
  const pts = prices.map((p, i) => {
    const x = (i / (prices.length - 1)) * w;
    const y = h - ((p - min) / range) * h;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(" ");
  const isUp = prices[prices.length - 1] >= prices[0];
  const color = isUp ? "#00d084" : "#ff4757";
  return `<svg width="${w}" height="${h}" class="spark">
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
  </svg>`;
}

// ── 工具函式 ────────────────────────────────────────────────
function pct(v)    { return (v > 0 ? "+" : "") + v.toFixed(2) + "%"; }
function cls(v)    { return v > 0 ? "chg-up" : v < 0 ? "chg-down" : "chg-flat"; }
function empty(m)  { return `<div class="empty-state">✓ ${m}</div>`; }

function aiTag(ai) {
  if (!ai || !ai.verdict || ai.verdict === "—") return `<span class="ai-none">—</span>`;
  const v = ai.verdict;
  const c = v.includes("買入") ? "ai-buy" : v.includes("避開") ? "ai-avoid" : "ai-watch";
  const e = v.includes("買入") ? "✅" : v.includes("避開") ? "❌" : "⏸";
  return `<div>
    <span class="${c}">${e} ${v}</span>
    ${ai.reason ? `<div class="ai-reason">${ai.reason}</div>` : ""}
  </div>`;
}

// ── 股票總覽表格 ────────────────────────────────────────────
function renderTable(stocks) {
  if (!stocks?.length) return empty("尚無股票資料，請先執行掃描");
  const rows = stocks.map(s => {
    const tag   = s.is_etf ? `<span class="tag-etf">ETF</span>` : `<span class="tag-stock">個股</span>`;
    const pills = s.signals?.length
      ? `<div class="pills">${s.signals.map(g => `<span class="pill">${g}</span>`).join("")}</div>`
      : `<span class="no-sig">—</span>`;
    return `<tr>
      <td><div class="ticker-wrap">${tag}<span class="t-name">${s.ticker.replace(".TW","")}</span></div></td>
      <td>${sparkline(s.prices_20d)}</td>
      <td class="r price-val">${s.price?.toFixed(2) ?? "—"}</td>
      <td class="r ${cls(s.change_pct)}">${pct(s.change_pct ?? 0)}</td>
      <td>${pills}</td>
      <td>${aiTag(s.ai)}</td>
    </tr>`;
  }).join("");
  return `<div class="tbl-wrap"><table>
    <thead><tr>
      <th>股票</th><th>近 20 日走勢</th><th class="r">現價</th><th class="r">漲跌幅</th><th>今日信號</th><th>AI 建議</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

// ── 持倉監控 ────────────────────────────────────────────────
function renderPortfolio(data) {
  if (!data?.length) return empty("尚未設定持倉（編輯 portfolio.json）");
  return `<div class="cards">${data.map(item => {
    const up = item.pct >= 0;
    let color = "c-green", cText = "持有中", cChip = "green";
    if (item.status === "停損") { color = "c-red";    cText = "⚠ 停損警告"; cChip = "red"; }
    if (item.status === "停利") { color = "c-green";  cText = "🎯 停利提醒"; cChip = "green"; }
    return `<div class="card ${color}">
      <div class="card-hd">
        <span class="card-ticker">${item.name}（${item.ticker.replace(".TW","")}）</span>
        <span class="chip ${cChip}">${cText}</span>
      </div>
      <div class="kv">
        <span class="k">買入價</span><span class="v">${item.buy_price}</span>
        <span class="k">現價</span><span class="v">${item.now_price}</span>
        <span class="k">損益</span><span class="v ${up ? "chg-up" : "chg-down"}">${item.pct >= 0 ? "+" : ""}${item.pct}%</span>
      </div>
    </div>`;
  }).join("")}</div>`;
}

// ── 重大公告 ────────────────────────────────────────────────
function renderAnnouncements(data) {
  if (!data?.length) return empty("近期無除息 / 法說會");
  return `<div class="cards">${data.map(item =>
    `<div class="card c-yellow">
      <div class="card-hd">
        <span class="card-ticker">${item.ticker.replace(".TW","")}</span>
        <span class="chip yellow">${item.type}</span>
      </div>
      <p class="card-msg">${item.message}</p>
    </div>`
  ).join("")}</div>`;
}

// ── 法人籌碼 ────────────────────────────────────────────────
function renderInstitutional(data) {
  if (!data?.length) return empty("今日無法人大買超");
  return `<div class="cards">${data.map(item =>
    `<div class="card c-purple">
      <div class="card-hd">
        <span class="card-ticker">${item.ticker.replace(".TW","")}</span>
        <span class="chip purple">法人買超</span>
      </div>
      <p class="card-msg">${item.message}</p>
    </div>`
  ).join("")}</div>`;
}

// ── ETF 折價 ────────────────────────────────────────────────
function renderETF(data) {
  if (!data?.length) return empty("今日無 ETF 折價機會");
  return `<div class="cards">${data.map(item =>
    `<div class="card c-cyan">
      <div class="card-hd">
        <span class="card-ticker">${item.ticker.replace(".TW","")}</span>
        <span class="chip cyan">折價 ${item.discount_pct}%</span>
      </div>
      <div class="kv">
        <span class="k">市價</span><span class="v">${item.price}</span>
        <span class="k">淨值</span><span class="v">${item.nav}</span>
      </div>
    </div>`
  ).join("")}</div>`;
}

// ── ADR 套利 ────────────────────────────────────────────────
function renderADR(data) {
  if (!data?.length) return empty("今日無 ADR 套利機會");
  return `<div class="cards">${data.map(item => {
    const up = item.gap_pct > 0;
    return `<div class="card ${up ? "c-green" : "c-red"}">
      <div class="card-hd">
        <span class="card-ticker">${item.name}</span>
        <span class="chip ${up ? "green" : "red"}">${up ? "美股溢價" : "美股折價"} ${Math.abs(item.gap_pct)}%</span>
      </div>
      <div class="kv">
        <span class="k">台股</span><span class="v">${item.tw_price}</span>
        <span class="k">美股換算</span><span class="v">${item.us_equiv}</span>
        <span class="k">匯率</span><span class="v">${item.usd_twd}</span>
      </div>
    </div>`;
  }).join("")}</div>`;
}

// ── 主渲染 ──────────────────────────────────────────────────
function render(d) {
  const stocks     = d.all_stocks || [];
  const signalN    = stocks.filter(s => s.signals?.length).length;
  const alertN     = (d.portfolio || []).filter(p => p.status !== "正常").length;
  const arbN       = (d.etf_arbitrage?.length || 0) + (d.adr_arbitrage?.length || 0);

  document.getElementById("nav-time").textContent = `最後更新：${d.scan_time}`;

  document.getElementById("app").innerHTML = `
    <div class="stat-row">
      <div class="stat s-blue">
        <div class="n" style="color:var(--blue)">${d.stocks_scanned}</div>
        <div class="l">追蹤股票總數</div>
      </div>
      <div class="stat s-green">
        <div class="n" style="color:var(--green)">${signalN}</div>
        <div class="l">今日有信號</div>
      </div>
      <div class="stat s-red">
        <div class="n" style="color:${alertN > 0 ? "var(--red)" : "var(--muted)"}">${alertN}</div>
        <div class="l">持倉警示</div>
      </div>
      <div class="stat s-gold">
        <div class="n" style="color:var(--gold)">${arbN}</div>
        <div class="l">套利機會</div>
      </div>
    </div>

    <div class="sec">
      <div class="sec-hd">📊 全部股票總覽 <span class="badge-count">${stocks.length}</span></div>
      ${renderTable(stocks)}
    </div>

    <div class="sec">
      <div class="sec-hd">⚠️ 持倉停損 / 停利 <span class="badge-count">${(d.portfolio||[]).length}</span></div>
      ${renderPortfolio(d.portfolio)}
    </div>

    <div class="sec">
      <div class="sec-hd">📅 重大公告 / 除息 <span class="badge-count">${(d.announcements||[]).length}</span></div>
      ${renderAnnouncements(d.announcements)}
    </div>

    <div class="sec">
      <div class="sec-hd">🏦 法人籌碼買超 <span class="badge-count">${(d.institutional||[]).length}</span></div>
      ${renderInstitutional(d.institutional)}
    </div>

    <div class="sec">
      <div class="sec-hd">💰 ETF 折價套利 <span class="badge-count">${(d.etf_arbitrage||[]).length}</span></div>
      ${renderETF(d.etf_arbitrage)}
    </div>

    <div class="sec">
      <div class="sec-hd">🌏 ADR 美股套利 <span class="badge-count">${(d.adr_arbitrage||[]).length}</span></div>
      ${renderADR(d.adr_arbitrage)}
    </div>

    <footer>台股信號儀表板 · 每個交易日 15:30 自動更新 · Powered by AI</footer>
  `;
}

async function load() {
  try {
    const r = await fetch("results.json?t=" + Date.now());
    if (!r.ok) throw new Error("尚無掃描資料，請先執行 GitHub Actions");
    render(await r.json());
  } catch (e) {
    document.getElementById("app").innerHTML =
      `<div class="loading">⚠️ ${e.message}</div>`;
  }
}

load();
</script>
</body>
</html>
