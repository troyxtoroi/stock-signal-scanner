<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>📈 台股信號儀表板</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f1117;
      --surface:  #1a1d27;
      --border:   #2a2d3e;
      --text:     #e2e8f0;
      --muted:    #8892a4;
      --green:    #22c55e;
      --red:      #ef4444;
      --yellow:   #f59e0b;
      --blue:     #3b82f6;
      --purple:   #a855f7;
      --cyan:     #06b6d4;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      padding: 20px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    header h1 { font-size: 1.6rem; font-weight: 700; }
    header h1 span { color: var(--green); }

    .meta { color: var(--muted); font-size: 0.85rem; line-height: 1.7; text-align: right; }

    .refresh-btn {
      background: var(--blue);
      color: white;
      border: none;
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: opacity .2s;
    }
    .refresh-btn:hover { opacity: .85; }

    /* 統計列 */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }
    .stat-card .num { font-size: 2rem; font-weight: 700; }
    .stat-card .lbl { color: var(--muted); font-size: 0.78rem; margin-top: 4px; }

    /* 區塊 */
    .section { margin-bottom: 28px; }
    .section-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .section-title .dot {
      width: 8px; height: 8px; border-radius: 50%;
    }

    /* 卡片 */
    .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 18px;
      border-left: 4px solid var(--border);
    }
    .card.green  { border-left-color: var(--green); }
    .card.red    { border-left-color: var(--red); }
    .card.yellow { border-left-color: var(--yellow); }
    .card.blue   { border-left-color: var(--blue); }
    .card.purple { border-left-color: var(--purple); }
    .card.cyan   { border-left-color: var(--cyan); }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .ticker {
      font-weight: 700;
      font-size: 1.05rem;
    }
    .badge {
      font-size: 0.72rem;
      padding: 3px 8px;
      border-radius: 20px;
      font-weight: 600;
    }
    .badge.green  { background: rgba(34,197,94,.15);  color: var(--green); }
    .badge.red    { background: rgba(239,68,68,.15);  color: var(--red); }
    .badge.yellow { background: rgba(245,158,11,.15); color: var(--yellow); }
    .badge.blue   { background: rgba(59,130,246,.15); color: var(--blue); }
    .badge.purple { background: rgba(168,85,247,.15); color: var(--purple); }
    .badge.cyan   { background: rgba(6,182,212,.15);  color: var(--cyan); }

    .signal-list { list-style: none; }
    .signal-list li {
      padding: 4px 0;
      font-size: 0.88rem;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    .signal-list li:last-child { border-bottom: none; }
    .signal-list li::before { content: "• "; color: var(--green); }

    .portfolio-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      font-size: 0.85rem;
    }
    .portfolio-grid .lbl { color: var(--muted); }
    .portfolio-grid .val { text-align: right; font-weight: 600; }
    .pct-pos { color: var(--green); }
    .pct-neg { color: var(--red); }

    .msg { font-size: 0.88rem; color: var(--muted); line-height: 1.6; }

    .empty {
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      color: var(--muted);
      font-size: 0.88rem;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 60px;
      color: var(--muted);
      font-size: 1.1rem;
    }

    footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.78rem;
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

<div id="app">
  <div class="loading">⏳ 載入中...</div>
</div>

<script>
const COLORS = { green: "green", red: "red", yellow: "yellow", blue: "blue", purple: "purple", cyan: "cyan" };

function badge(text, color) {
  return `<span class="badge ${color}">${text}</span>`;
}

function card(color, header, body) {
  return `<div class="card ${color}">
    <div class="card-header">${header}</div>
    ${body}
  </div>`;
}

function emptyState(msg) {
  return `<div class="empty">✅ ${msg}</div>`;
}

function renderSection(title, dotColor, content) {
  return `<div class="section">
    <div class="section-title">
      <span class="dot" style="background:var(--${dotColor})"></span>${title}
    </div>
    ${content}
  </div>`;
}

function renderTechnical(data) {
  if (!data.length) return emptyState("今日無技術面信號");
  const cards = data.map(item => {
    const signals = item.signals.map(s => `<li>${s}</li>`).join("");
    return card("green",
      `<span class="ticker">${item.ticker}</span>${badge("買入信號", "green")}`,
      `<ul class="signal-list">${signals}</ul>`
    );
  }).join("");
  return `<div class="cards">${cards}</div>`;
}

function renderAnnouncements(data) {
  if (!data.length) return emptyState("近期無重大公告");
  const cards = data.map(item =>
    card("yellow",
      `<span class="ticker">${item.ticker}</span>${badge(item.type, "yellow")}`,
      `<p class="msg">${item.message}</p>`
    )
  ).join("");
  return `<div class="cards">${cards}</div>`;
}

function renderPortfolio(data) {
  if (!data.length) return emptyState("尚未設定持倉");
  const cards = data.map(item => {
    const pctClass = item.pct >= 0 ? "pct-pos" : "pct-neg";
    const pctText  = `${item.pct >= 0 ? "+" : ""}${item.pct}%`;
    let color = "blue", badgeText = "持有中", badgeColor = "blue";
    if (item.status === "停損") { color = "red";    badgeText = "⚠ 停損警告"; badgeColor = "red"; }
    if (item.status === "停利") { color = "green";  badgeText = "🎯 停利提醒"; badgeColor = "green"; }
    return card(color,
      `<span class="ticker">${item.name}（${item.ticker}）</span>${badge(badgeText, badgeColor)}`,
      `<div class="portfolio-grid">
        <span class="lbl">買入價</span><span class="val">${item.buy_price}</span>
        <span class="lbl">現價</span><span class="val">${item.now_price}</span>
        <span class="lbl">損益</span><span class="val ${pctClass}">${pctText}</span>
      </div>`
    );
  }).join("");
  return `<div class="cards">${cards}</div>`;
}

function renderInstitutional(data) {
  if (!data.length) return emptyState("今日無法人大買超");
  const cards = data.map(item =>
    card("purple",
      `<span class="ticker">${item.ticker}</span>${badge("法人買超", "purple")}`,
      `<p class="msg">${item.message}</p>`
    )
  ).join("");
  return `<div class="cards">${cards}</div>`;
}

function renderETFArbitrage(data) {
  if (!data.length) return emptyState("今日 ETF 無折價機會");
  const cards = data.map(item =>
    card("cyan",
      `<span class="ticker">${item.ticker}</span>${badge(`折價 ${item.discount_pct}%`, "cyan")}`,
      `<div class="portfolio-grid">
        <span class="lbl">市價</span><span class="val">${item.price}</span>
        <span class="lbl">淨值(NAV)</span><span class="val">${item.nav}</span>
        <span class="lbl">折價幅度</span><span class="val pct-neg">${item.discount_pct}%</span>
      </div>`
    )
  ).join("");
  return `<div class="cards">${cards}</div>`;
}

function renderADR(data) {
  if (!data.length) return emptyState("今日無 ADR 套利機會");
  const cards = data.map(item => {
    const dir = item.gap_pct > 0 ? "美股溢價" : "美股折價";
    const color = item.gap_pct > 0 ? "green" : "red";
    return card(color,
      `<span class="ticker">${item.name}</span>${badge(dir, color)}`,
      `<div class="portfolio-grid">
        <span class="lbl">台股現價</span><span class="val">${item.tw_price}</span>
        <span class="lbl">美股換算</span><span class="val">${item.us_equiv}</span>
        <span class="lbl">差距</span><span class="val ${item.gap_pct > 0 ? "pct-pos" : "pct-neg"}">${item.gap_pct > 0 ? "+" : ""}${item.gap_pct}%</span>
        <span class="lbl">匯率</span><span class="val">${item.usd_twd}</span>
      </div>`
    );
  }).join("");
  return `<div class="cards">${cards}</div>`;
}

function countAlerts(d) {
  return d.technical_signals.length +
    d.announcements.length +
    d.portfolio.filter(p => p.status !== "正常").length +
    d.institutional.length +
    d.etf_arbitrage.length +
    d.adr_arbitrage.length;
}

function render(d) {
  const alerts = countAlerts(d);
  document.getElementById("app").innerHTML = `
    <header>
      <h1>📈 台股 <span>信號儀表板</span></h1>
      <div class="meta">
        最後掃描：${d.scan_time}<br>
        掃描股票：${d.stocks_scanned} 支個股 + ${d.etfs_scanned} 支 ETF
      </div>
      <button class="refresh-btn" onclick="load()">🔄 重新整理</button>
    </header>

    <div class="stats">
      <div class="stat-card">
        <div class="num" style="color:var(--blue)">${d.stocks_scanned}</div>
        <div class="lbl">掃描個股</div>
      </div>
      <div class="stat-card">
        <div class="num" style="color:var(--cyan)">${d.etfs_scanned}</div>
        <div class="lbl">掃描 ETF</div>
      </div>
      <div class="stat-card">
        <div class="num" style="color:${alerts > 0 ? "var(--green)" : "var(--muted)"}">${alerts}</div>
        <div class="lbl">今日信號數</div>
      </div>
      <div class="stat-card">
        <div class="num" style="color:var(--purple)">${d.portfolio.length}</div>
        <div class="lbl">持倉追蹤</div>
      </div>
    </div>

    ${renderSection("📊 技術面買入信號", "green",   renderTechnical(d.technical_signals))}
    ${renderSection("⚠️ 持倉停損 / 停利", "red",     renderPortfolio(d.portfolio))}
    ${renderSection("📅 重大公告 / 除息", "yellow",  renderAnnouncements(d.announcements))}
    ${renderSection("🏦 法人籌碼買超",    "purple",  renderInstitutional(d.institutional))}
    ${renderSection("💰 ETF 折價套利",    "cyan",    renderETFArbitrage(d.etf_arbitrage))}
    ${renderSection("🌏 ADR 美股套利",    "blue",    renderADR(d.adr_arbitrage))}

    <footer>台股信號儀表板 · 每個交易日 15:30 自動更新</footer>
  `;
}

async function load() {
  try {
    const r = await fetch("results.json?t=" + Date.now());
    if (!r.ok) throw new Error("尚無掃描資料");
    render(await r.json());
  } catch (e) {
    document.getElementById("app").innerHTML =
      `<div class="loading">⚠️ ${e.message}<br><br>
       請先到 GitHub Actions 執行一次掃描，結果才會出現在這裡。</div>`;
  }
}

load();
</script>
</body>
</html>
